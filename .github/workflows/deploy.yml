name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; annule les déploiements en attente
# si un nouveau push arrive entre-temps.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (avec assets Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      # actions/checkout ne télécharge que les pointeurs LFS par défaut ;
      # ce checkout explicite récupère le contenu réel des fichiers.
      - name: Récupération du contenu LFS
        run: git lfs pull

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload de l'artefact de build
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publication sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
