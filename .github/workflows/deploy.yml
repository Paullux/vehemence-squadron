name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; annule les déploiements en attente
# si un nouveau push arrive entre-temps.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # lfs: false volontairement : on gère le pull nous-mêmes ci-dessous pour
      # pouvoir le mettre en cache. Sans ça, chaque run retélécharge la
      # totalité des objets LFS (~300 Mo) et grignote le quota gratuit
      # GitHub (1 Go de bande passante LFS/mois) en 3-4 déploiements.
      - name: Checkout (pointeurs LFS uniquement)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Liste des objets LFS (pour la clé de cache)
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Cache des objets LFS
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}

      # Ne consomme de la bande passante LFS que pour les objets absents du
      # cache (nouveaux fichiers ou fichiers modifiés depuis le dernier run).
      - name: Récupération du contenu LFS
        run: git lfs pull

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload de l'artefact de build
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publication sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
